pre-commit:
  commands:
    biome-check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx biome check --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
    clippy:
      glob: "./src-tauri/*.rs"
      run: |
        - cd ./src-tauri
        - cargo clippy --all-targets -- -D warnings
    fmt-check:
      glob: "./src-tauri/*.rs"
      run: |
        - cd ./src-tauri
        - cargo fmt --check

